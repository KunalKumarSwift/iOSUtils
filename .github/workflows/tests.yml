# Runs the Swift test suite on every push and pull request.
#
# Two jobs run in parallel:
#   test-macos  — uses the macOS runner where the Apple toolchain is native.
#   test-linux  — validates that platform-agnostic code compiles and passes on
#                 Linux (UIKit-guarded code is excluded by the compiler).
#
# UIKit-dependent providers (haptics, alerts, UIColor/UIView extensions) are
# wrapped in `#if canImport(UIKit)` and are therefore excluded from both jobs;
# they are covered by XCUITest suites run separately on a simulator.

name: Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test-macos:
    name: Test (macOS)
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Swift version
        run: swift --version

      - name: Run tests
        run: swift test --parallel

  test-linux:
    name: Test (Linux)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Swift version
        run: swift --version

      - name: Run tests
        run: swift test --parallel
